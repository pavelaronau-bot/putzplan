name: CI

# Ручной запуск нужен для внешней проверки Sprint 1: владелец репозитория
# открывает Actions → CI → Run workflow и получает ссылки на прогоны.
on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:
    inputs:
      allow_missing_openapi_baseline:
        description: "Разрешить отсутствие базового openapi.json (только первичная загрузка)"
        type: boolean
        default: false
        required: false

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  backend-quality:
    name: Backend · стиль и типы
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Установка инструментов
        run: python -m pip install --upgrade pip ruff mypy
      - name: Ruff (блокирует сборку)
        run: ruff check backend/app backend/tests
      - name: Mypy (блокирует сборку)
        run: |
          python -m pip install -e "backend[dev]"
          cd backend && mypy app

  database:
    name: База · миграции и SQL-тесты
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 5s
          --health-timeout 3s --health-retries 20
    env:
      PGHOST: 127.0.0.1
      PGUSER: postgres
      PGPASSWORD: postgres
      PUTZPLAN_MIGRATION_PW: ${{ secrets.CI_DB_MIGRATION_PASSWORD || 'ci_migration' }}
      PUTZPLAN_RUNTIME_PW: ${{ secrets.CI_DB_RUNTIME_PASSWORD || 'ci_runtime' }}
      PUTZPLAN_AUDIT_PW: ${{ secrets.CI_DB_AUDIT_PASSWORD || 'ci_audit' }}
      PUTZPLAN_READONLY_PW: ${{ secrets.CI_DB_READONLY_PASSWORD || 'ci_readonly' }}
    steps:
      - uses: actions/checkout@v4
      - name: Клиент PostgreSQL
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: SQL-тесты укрепления базы (56 проверок, падает при любом failed)
        run: bash infrastructure/db/tests/run_tests.sh putzplan_ci
      - name: Структурная валидация схемы
        run: |
          PGPASSWORD="$PUTZPLAN_MIGRATION_PW" psql -v ON_ERROR_STOP=1 -h 127.0.0.1 \
            -U putzplan_migration -d putzplan_ci -f infrastructure/db/validate.sql

  backend-tests:
    name: Backend · миграции Alembic и тесты
    runs-on: ubuntu-latest
    needs: [backend-quality, database]
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: putzplan_ci
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 5s
          --health-timeout 3s --health-retries 20
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s
          --health-timeout 3s --health-retries 10
    env:
      PGHOST: 127.0.0.1
      PGUSER: postgres
      PGPASSWORD: postgres
      DB_NAME: putzplan_ci
      REDIS_URL: redis://127.0.0.1:6379/0
      APP_ENV: test
      DB_MIGRATION_PASSWORD: ${{ secrets.CI_DB_MIGRATION_PASSWORD || 'ci_migration' }}
      DB_RUNTIME_PASSWORD: ${{ secrets.CI_DB_RUNTIME_PASSWORD || 'ci_runtime' }}
      DB_AUDIT_PASSWORD: ${{ secrets.CI_DB_AUDIT_PASSWORD || 'ci_audit' }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Клиент PostgreSQL
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Зависимости
        run: python -m pip install --upgrade pip && python -m pip install -e "backend[dev]" psycopg2-binary pyyaml
      - name: Bootstrap ролей базы
        run: |
          psql -v ON_ERROR_STOP=1 -d putzplan_ci \
            -v mig_pw="$DB_MIGRATION_PASSWORD" -v run_pw="$DB_RUNTIME_PASSWORD" \
            -v aud_pw="$DB_AUDIT_PASSWORD" -v ro_pw="${{ secrets.CI_DB_READONLY_PASSWORD || 'ci_readonly' }}" \
            -f infrastructure/db/migrations/00_platform_bootstrap.sql
          psql -d putzplan_ci -c "GRANT CREATE ON DATABASE putzplan_ci TO putzplan_migration"
      - name: Alembic upgrade head на чистой базе
        run: cd backend && python -m alembic upgrade head
      - name: Alembic downgrade -1 и обратный upgrade
        run: cd backend && python -m alembic downgrade -1 && python -m alembic upgrade head
      - name: Демонстрационные данные
        run: cd backend && PYTHONPATH=. python ../infrastructure/scripts/seed_dev.py
      - name: Unit и integration тесты
        run: cd backend && python -m pytest -q --junitxml=../pytest-report.xml
      - name: Генерация контракта OpenAPI
        run: cd backend && PYTHONPATH=. python ../infrastructure/scripts/export_openapi.py
      - name: Контракт в репозитории совпадает с кодом
        run: |
          git diff --exit-code openapi/ \
            || (echo "openapi/ устарел: выполните make openapi и закоммитьте результат" && exit 1)
      - name: Структура контракта OpenAPI 3.1
        run: |
          python - <<'PY'
          import json, sys
          schema = json.load(open('openapi/openapi.json'))
          assert schema['openapi'].startswith('3.1'), 'ожидается OpenAPI 3.1'
          required = ['/api/v1/auth/login', '/api/v1/auth/refresh', '/api/v1/me',
                      '/api/v1/users', '/api/v1/roles', '/api/v1/audit-logs',
                      '/health', '/ready']
          missing = [p for p in required if p not in schema['paths']]
          if missing:
              print('в контракте нет путей:', missing, file=sys.stderr)
              sys.exit(1)
          print(f"OpenAPI 3.1 валиден: {len(schema['paths'])} путей")
          PY
      - name: Фикстуры гейта совместимости
        run: cd backend && python -m pytest tests/test_openapi_compat.py -q
      - name: Breaking changes контракта (fail-closed)
        env:
          ALLOW_MISSING_OPENAPI_BASELINE: ${{ inputs.allow_missing_openapi_baseline || vars.ALLOW_MISSING_OPENAPI_BASELINE }}
          BASE_REF: ${{ github.base_ref || github.event.repository.default_branch || 'main' }}
        run: |
          set -euo pipefail
          if ! git fetch origin "$BASE_REF" --depth=1; then
            echo "Не удалось получить ветку $BASE_REF — проверка контракта невозможна" >&2
            exit 1
          fi
          if git show "origin/$BASE_REF:openapi/openapi.json" > /tmp/base.json; then
            python infrastructure/scripts/openapi_diff.py /tmp/base.json openapi/openapi.json
          elif [ "${ALLOW_MISSING_OPENAPI_BASELINE:-false}" = "true" ]; then
            echo "::warning::Базовый контракт отсутствует, режим первичной загрузки разрешён явно"
          else
            echo "В ветке $BASE_REF нет openapi/openapi.json." >&2
            echo "Это либо ошибка, либо первичная загрузка: запустите workflow вручную" >&2
            echo "с параметром allow_missing_openapi_baseline = true." >&2
            exit 1
          fi
      - name: Отчёт тестов
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: pytest-report.xml
          if-no-files-found: warn

  frontend:
    name: Frontend · типы, тесты, сборка
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Чистая установка зависимостей
        run: npm ci
        working-directory: frontend
      - name: Проверка типов
        run: npm run lint
        working-directory: frontend
      - name: Модульные тесты
        run: npx vitest run
        working-directory: frontend
      - name: Сборка
        run: npm run build
        working-directory: frontend
      - name: Уязвимости зависимостей npm (блокирует сборку)
        run: npm audit --audit-level=high
        working-directory: frontend
      - name: Синхронность package-lock.json
        run: |
          npm install --package-lock-only --ignore-scripts
          git diff --exit-code package-lock.json \
            || (echo "package-lock.json не синхронизирован с package.json" && exit 1)
        working-directory: frontend

  e2e:
    name: E2E · Playwright Chromium
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend]
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: putzplan_ci
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 5s
          --health-timeout 3s --health-retries 20
    env:
      PGHOST: 127.0.0.1
      PGUSER: postgres
      PGPASSWORD: postgres
      DB_NAME: putzplan_ci
      APP_ENV: development
      DB_MIGRATION_PASSWORD: ${{ secrets.CI_DB_MIGRATION_PASSWORD || 'ci_migration' }}
      DB_RUNTIME_PASSWORD: ${{ secrets.CI_DB_RUNTIME_PASSWORD || 'ci_runtime' }}
      DB_AUDIT_PASSWORD: ${{ secrets.CI_DB_AUDIT_PASSWORD || 'ci_audit' }}
      E2E_BASE_URL: http://localhost:5173
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Клиент PostgreSQL
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Зависимости backend
        run: python -m pip install --upgrade pip && python -m pip install -e "backend[dev]" psycopg2-binary pyyaml
      - name: Подготовка базы
        run: |
          psql -v ON_ERROR_STOP=1 -d putzplan_ci \
            -v mig_pw="$DB_MIGRATION_PASSWORD" -v run_pw="$DB_RUNTIME_PASSWORD" \
            -v aud_pw="$DB_AUDIT_PASSWORD" -v ro_pw="${{ secrets.CI_DB_READONLY_PASSWORD || 'ci_readonly' }}" \
            -f infrastructure/db/migrations/00_platform_bootstrap.sql
          psql -d putzplan_ci -c "GRANT CREATE ON DATABASE putzplan_ci TO putzplan_migration"
          (cd backend && python -m alembic upgrade head)
          PYTHONPATH=backend python infrastructure/scripts/seed_dev.py
      - name: Запуск API и ожидание готовности
        run: |
          set -euo pipefail
          cd backend
          nohup python -m uvicorn app.main:app --host 127.0.0.1 --port 8000 > "$RUNNER_TEMP/api.log" 2>&1 &
          echo $! > "$RUNNER_TEMP/api.pid"
          for i in $(seq 1 40); do
            if curl -fsS http://127.0.0.1:8000/health > /dev/null; then
              echo "API готов после $i попыток"; exit 0
            fi
            sleep 1
          done
          echo "API не поднялся за 40 секунд" >&2
          cat "$RUNNER_TEMP/api.log" >&2
          exit 1
      - name: Smoke вертикального среза по HTTP
        run: cd backend && python tests/smoke_vertical_slice.py
      - name: Установка зависимостей и браузера Chromium
        run: |
          npm ci
          npx playwright install --with-deps chromium
        working-directory: frontend
      - name: Сборка и запуск фронтенда
        run: |
          set -euo pipefail
          npm run build
          nohup npx vite preview --port 5173 --strictPort > "$RUNNER_TEMP/frontend.log" 2>&1 &
          echo $! > "$RUNNER_TEMP/frontend.pid"
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:5173/ > /dev/null; then
              echo "Фронтенд готов после $i попыток"; exit 0
            fi
            sleep 1
          done
          echo "Фронтенд не поднялся за 30 секунд" >&2
          cat "$RUNNER_TEMP/frontend.log" >&2
          exit 1
        working-directory: frontend
        env:
          VITE_API_PROXY_TARGET: http://127.0.0.1:8000
      - name: Playwright тесты
        run: npx playwright test
        working-directory: frontend
      - name: Отчёты и логи
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            frontend/playwright-report/
            frontend/test-results/
          if-no-files-found: warn

  security:
    name: Безопасность · зависимости и SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Bandit (SAST)
        run: python -m pip install bandit && bandit -r backend/app -ll
      - name: Уязвимости зависимостей Python (блокирует сборку)
        # Тот же скрипт запускается локально командой make security,
        # поэтому расхождений между машиной разработчика и CI нет.
        run: bash infrastructure/scripts/audit_python_deps.sh
      - name: Секреты в коде
        run: |
          ! grep -rInE "(password|secret|token)[[:space:]]*[:=][[:space:]]*['\"][A-Za-z0-9_-]{12,}" \
            --include='*.py' --include='*.ts' --include='*.tsx' --include='*.sql' --include='*.yml' \
            backend/app frontend/src infrastructure \
            | grep -v 'change_me\|test_\|dev-only\|ci_\|demo\|example' \
            || (echo "Найдены возможные секреты" && exit 1)
      - name: Запрет TODO в миграциях
        run: '! grep -rn "TODO\|FIXME" infrastructure/db/migrations backend/alembic/versions || exit 1'

  docker:
    name: Docker · сборка, запуск, smoke, повторный чистый старт
    runs-on: ubuntu-latest
    needs: [backend-quality, database, backend-tests, frontend, security]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Версии Docker
        run: |
          docker --version
          docker compose version
      - name: Подготовка окружения
        run: cp .env.example .env
      - name: Валидация compose-файла
        run: docker compose config > /dev/null
      - name: Сборка образов
        run: |
          set -euo pipefail
          docker build -f infrastructure/docker/backend.Dockerfile -t putzplan-api:ci .
          docker build -f infrastructure/docker/frontend.Dockerfile -t putzplan-ui:ci .
      - name: Первый запуск с чистого тома
        run: |
          set -euo pipefail
          docker compose up --build -d
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8000/health > /dev/null; then
              echo "API поднялся после $i попыток"; break
            fi
            if [ "$i" -eq 60 ]; then
              echo "API не поднялся за 120 секунд" >&2
              docker compose ps
              docker compose logs --no-color | tail -200
              exit 1
            fi
            sleep 2
          done
      - name: Проверка /health
        run: |
          set -euo pipefail
          curl -fsS http://localhost:8000/health | tee /tmp/health.json
          grep -q '"status":"ok"' /tmp/health.json
      - name: Проверка /ready
        run: |
          set -euo pipefail
          curl -fsS http://localhost:8000/ready | tee /tmp/ready.json
          grep -q '"status":"ready"' /tmp/ready.json
          grep -q '"db_runtime":"ok"' /tmp/ready.json
          grep -q '"db_audit":"ok"' /tmp/ready.json
      - name: Демонстрационные данные внутри контейнера
        run: docker compose exec -T api python -m scripts.seed_container
      - name: Compose smoke — вход, права, изоляция, журнал
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip httpx
          python backend/tests/smoke_compose.py
        env:
          API_BASE: http://localhost:8000
      - name: Проверка фронтенда за nginx
        run: |
          set -euo pipefail
          curl -fsS http://localhost:8080/ | grep -qi "<!doctype html"
      - name: Остановка с удалением томов
        run: docker compose down -v
      - name: Повторный чистый запуск
        run: |
          set -euo pipefail
          docker compose up --build -d
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:8000/health > /dev/null; then
              echo "Повторный запуск успешен после $i попыток"; break
            fi
            if [ "$i" -eq 60 ]; then
              echo "Повторный запуск не удался" >&2
              docker compose logs --no-color | tail -200
              exit 1
            fi
            sleep 2
          done
          curl -fsS http://localhost:8000/ready | grep -q '"status":"ready"'
      - name: Логи при ошибке
        if: failure()
        run: docker compose logs --no-color | tail -300
      - name: Финальная остановка
        if: always()
        run: docker compose down -v

  release-gate:
    name: Release Gate — все обязательные проверки
    runs-on: ubuntu-latest
    if: always()
    needs: [backend-quality, database, backend-tests, frontend, e2e, security, docker]
    steps:
      - name: Проверка результатов обязательных задач
        env:
          RESULTS: ${{ toJSON(needs) }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json, os, sys
          results = json.loads(os.environ["RESULTS"])
          print("Результаты обязательных задач:")
          for name, data in sorted(results.items()):
              print(f"  {name:18} {data.get('result')}")
          failed = [n for n, d in results.items() if d.get("result") != "success"]
          if failed:
              print("\nRelease Gate НЕ пройден: " + ", ".join(sorted(failed)), file=sys.stderr)
              sys.exit(1)
          print("\nRelease Gate пройден: все обязательные задачи успешны")
          PY
